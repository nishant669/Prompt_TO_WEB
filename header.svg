<svg fill="none" viewBox="0 0 800 240" width="800" height="240" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .canvas {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          background: #0d1117;
          height: 200px;
          border-radius: 16px;
          border: 1px solid #30363d;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          position: relative;
          overflow: hidden;
        }
        .glow {
          position: absolute;
          width: 150px;
          height: 150px;
          background: #38bdf8;
          filter: blur(80px);
          opacity: 0.2;
          top: -50px;
          left: -50px;
        }
        .title {
          font-size: 42px;
          font-weight: 900;
          background: linear-gradient(90deg, #38bdf8, #818cf8);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          margin-bottom: 8px;
        }
        .status-bar {
          display: flex;
          align-items: center;
          gap: 8px;
          color: #8b949e;
          font-size: 14px;
          font-family: 'Courier New', monospace;
        }
        .pulse {
          width: 8px;
          height: 8px;
          background: #238636;
          border-radius: 50%;
          box-shadow: 0 0 0 0 rgba(35, 134, 54, 0.7);
          animation: pulse 2s infinite;
        }
        @keyframes pulse {
          0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(35, 134, 54, 0.7); }
          70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(35, 134, 54, 0); }
          100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(35, 134, 54, 0); }
        }
      </style>
      <div class="canvas">
        <div class="glow"></div>
        <div class="title">PROMPT TO WEB</div>
        <div class="status-bar">
          <div class="pulse"></div>
          <span>SYSTEM_READY: AI_CORE_ACTIVE</span>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
