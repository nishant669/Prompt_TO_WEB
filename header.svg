<svg fill="none" viewBox="0 0 800 300" width="800" height="300" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .wrapper {
          background: #050505;
          height: 280px;
          border-radius: 20px;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          font-family: 'Inter', -apple-system, sans-serif;
          position: relative;
          overflow: hidden;
          border: 1px solid #1a1a1a;
        }
        .grid {
          position: absolute;
          width: 200%;
          height: 200%;
          background-image: linear-gradient(#111 1px, transparent 1px), linear-gradient(90deg, #111 1px, transparent 1px);
          background-size: 40px 40px;
          transform: perspective(500px) rotateX(60deg);
          bottom: -50%;
          animation: move 10s linear infinite;
          opacity: 0.5;
        }
        .content { z-index: 10; text-align: center; }
        .logo {
          font-size: 50px;
          font-weight: 900;
          letter-spacing: -2px;
          background: linear-gradient(to right, #00f2fe, #4facfe);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          filter: drop-shadow(0 0 15px rgba(79, 172, 254, 0.4));
        }
        .scan-line {
          position: absolute;
          width: 100%;
          height: 2px;
          background: linear-gradient(90deg, transparent, #4facfe, transparent);
          top: 0;
          animation: scan 4s ease-in-out infinite;
        }
        @keyframes scan { 0% { top: 0% } 50% { top: 100% } 100% { top: 0% } }
        @keyframes move { from { transform: perspective(500px) rotateX(60deg) translateY(0); } to { transform: perspective(500px) rotateX(60deg) translateY(40px); } }
      </style>
      <div class="wrapper">
        <div class="grid"></div>
        <div class="scan-line"></div>
        <div class="content">
          <div class="logo">PROMPT_TO_WEB</div>
          <div style="color: #666; font-size: 14px; margin-top: 10px; letter-spacing: 4px; font-weight: 300;">GEN_AI_CHALLENGE // 2026</div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
